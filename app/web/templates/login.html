{% extends "base.html" %}
{% block content_public %}
<div style="display:flex;min-height:100vh;align-items:center;justify-content:center;">
  <form method="post" action="/admin/login" class="card" style="width:340px;">
    <div class="brand" style="text-align:center;color:var(--red2);font-size:20px;font-weight:800;margin-bottom:6px;">⬢ AI TOKEN</div>
    <div class="muted" style="text-align:center;margin-bottom:18px;">پنل مدیریت</div>
    {% if error %}<div class="pill bad" style="display:block;text-align:center;margin-bottom:12px;padding:8px;">{{ error }}</div>{% endif %}
    <label>رمز عبور ادمین</label>
    <input type="password" name="password" autofocus required>
    <button class="btn" style="width:100%;margin-top:16px;">ورود</button>
  </form>
</div>
{% endblock %}
